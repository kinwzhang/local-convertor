services:
  converter:
    image: zwj808/clash-local-converter:latest
    container_name: clash-local-converter
    ports:
      - "21301:5000"
    volumes:
      - app-data:/data
    environment:
      - SECRET_KEY=change-me-in-production
      - DATA_DIR=/data
      - TIMEZONE=Asia/Singapore
    restart: unless-stopped

volumes:
  app-data:
